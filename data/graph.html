                  nodeColors = {};

                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"physics": {"forceAtlas2Based": {"gravitationalConstant": -80, "centralGravity": 0.008, "springLength": 200, "springConstant": 0.05}, "solver": "forceAtlas2Based", "stabilization": {"iterations": 200}}, "edges": {"arrows": {"to": {"enabled": true, "scaleFactor": 0.8}}, "color": {"color": "#888888"}, "smooth": {"type": "curvedCW", "roundness": 0.1}}, "nodes": {"font": {"size": 14, "strokeWidth": 3, "strokeColor": "#1a1a2e"}, "borderWidth": 2}, "interaction": {"zoomSpeed": 0.3, "hover": true}};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

<script>
/* ════ 상태 ════ */
var LV=1, FG=null, DD=null;

/* ════ 데이터 ════ */
var NM={"FACT_INVENTORY": {"type": "fact_table", "columns": ["INVENTORY_ID", "PRODUCT_ID", "LOCATION_ID", "SNAPSHOT_DATE", "STOCK_QTY", "SAFETY_STOCK_QTY", "REORDER_POINT", "COVERAGE_WEEKS", "STOCK_STATUS"], "col_types": {"INVENTORY_ID": "string", "PRODUCT_ID": "string", "LOCATION_ID": "string", "SNAPSHOT_DATE": "datetime", "STOCK_QTY": "numeric", "SAFETY_STOCK_QTY": "numeric", "REORDER_POINT": "numeric", "COVERAGE_WEEKS": "numeric", "STOCK_STATUS": "string"}, "fk_cols": ["INVENTORY_ID", "PRODUCT_ID", "LOCATION_ID"], "out_edges": [{"to": "MST_PRODUCT", "rel": "PRODUCT_ID"}], "in_edges": []}, "FACT_MONTHLY_SALES": {"type": "fact_table", "columns": ["SALE_ID", "PRODUCT_ID", "CHANNEL_ID", "YEAR_MONTH", "SALES_QTY", "SALES_AMOUNT", "CURRENCY", "RETURN_QTY", "NET_SALES_QTY"], "col_types": {"SALE_ID": "string", "PRODUCT_ID": "string", "CHANNEL_ID": "string", "YEAR_MONTH": "string", "SALES_QTY": "numeric", "SALES_AMOUNT": "numeric", "CURRENCY": "string", "RETURN_QTY": "numeric", "NET_SALES_QTY": "numeric"}, "fk_cols": ["SALE_ID", "PRODUCT_ID", "CHANNEL_ID"], "out_edges": [{"to": "MST_PRODUCT", "rel": "PRODUCT_ID"}, {"to": "MST_CHANNEL", "rel": "CHANNEL_ID"}], "in_edges": []}, "FACT_ORDER": {"type": "fact_table", "columns": ["ORDER_ID", "PRODUCT_ID", "SUPPLIER_ID", "ORDER_DATE", "EXPECTED_DATE", "QTY", "UNIT_COST", "STATUS"], "col_types": {"ORDER_ID": "string", "PRODUCT_ID": "string", "SUPPLIER_ID": "string", "ORDER_DATE": "datetime", "EXPECTED_DATE": "datetime", "QTY": "numeric", "UNIT_COST": "numeric", "STATUS": "string"}, "fk_cols": ["ORDER_ID", "PRODUCT_ID", "SUPPLIER_ID"], "out_edges": [{"to": "MST_PRODUCT", "rel": "PRODUCT_ID"}, {"to": "MST_SUPPLIER", "rel": "SUPPLIER_ID"}], "in_edges": []}, "FACT_RETURN": {"type": "fact_table", "columns": ["RETURN_ID", "PRODUCT_ID", "CHANNEL_ID", "RETURN_DATE", "QTY", "REASON", "REFUND_AMOUNT"], "col_types": {"RETURN_ID": "string", "PRODUCT_ID": "string", "CHANNEL_ID": "string", "RETURN_DATE": "datetime", "QTY": "numeric", "REASON": "string", "REFUND_AMOUNT": "numeric"}, "fk_cols": ["RETURN_ID", "PRODUCT_ID", "CHANNEL_ID"], "out_edges": [{"to": "MST_PRODUCT", "rel": "PRODUCT_ID"}, {"to": "MST_CHANNEL", "rel": "CHANNEL_ID"}], "in_edges": []}, "MST_CHANNEL": {"type": "master_table", "columns": ["CHANNEL_ID", "CHANNEL_NAME", "CHANNEL_TYPE", "REGION", "COMMISSION_RATE"], "col_types": {"CHANNEL_ID": "string", "CHANNEL_NAME": "string", "CHANNEL_TYPE": "string", "REGION": "string", "COMMISSION_RATE": "numeric"}, "fk_cols": ["CHANNEL_ID"], "out_edges": [], "in_edges": [{"from": "FACT_MONTHLY_SALES", "rel": "CHANNEL_ID"}, {"from": "FACT_RETURN", "rel": "CHANNEL_ID"}]}, "MST_PRODUCT": {"type": "master_table", "columns": ["PRODUCT_ID", "PRODUCT_NAME", "CATEGORY", "DEMAND_TYPE", "SEASONAL_PEAK", "LIFECYCLE_STAGE", "SUPPLIER_ID", "PRICE_KRW", "PRICE_USD", "LAUNCH_DATE", "STATUS"], "col_types": {"PRODUCT_ID": "string", "PRODUCT_NAME": "string", "CATEGORY": "string", "DEMAND_TYPE": "string", "SEASONAL_PEAK": "string", "LIFECYCLE_STAGE": "string", "SUPPLIER_ID": "string", "PRICE_KRW": "numeric", "PRICE_USD": "numeric", "LAUNCH_DATE": "datetime", "STATUS": "string"}, "fk_cols": ["PRODUCT_ID", "SUPPLIER_ID"], "out_edges": [{"to": "MST_SUPPLIER", "rel": "SUPPLIER_ID"}], "in_edges": [{"from": "FACT_INVENTORY", "rel": "PRODUCT_ID"}, {"from": "FACT_MONTHLY_SALES", "rel": "PRODUCT_ID"}, {"from": "FACT_ORDER", "rel": "PRODUCT_ID"}, {"from": "FACT_RETURN", "rel": "PRODUCT_ID"}]}, "MST_SUPPLIER": {"type": "master_table", "columns": ["SUPPLIER_ID", "SUPPLIER_NAME", "COUNTRY", "LEAD_TIME_DAYS", "MOQ", "CONTRACT_TYPE", "STATUS"], "col_types": {"SUPPLIER_ID": "string", "SUPPLIER_NAME": "string", "COUNTRY": "string", "LEAD_TIME_DAYS": "datetime", "MOQ": "numeric", "CONTRACT_TYPE": "string", "STATUS": "string"}, "fk_cols": ["SUPPLIER_ID"], "out_edges": [], "in_edges": [{"from": "FACT_ORDER", "rel": "SUPPLIER_ID"}, {"from": "MST_PRODUCT", "rel": "SUPPLIER_ID"}]}, "MST_WAREHOUSE": {"type": "master_table", "columns": ["WAREHOUSE_ID", "WAREHOUSE_NAME", "LOCATION", "CAPACITY_UNITS", "TYPE"], "col_types": {"WAREHOUSE_ID": "string", "WAREHOUSE_NAME": "string", "LOCATION": "string", "CAPACITY_UNITS": "numeric", "TYPE": "string"}, "fk_cols": ["WAREHOUSE_ID"], "out_edges": [], "in_edges": []}};

/* 노드 → 그룹 */
function grp(id){
  var t=(NM[id]||{}).type||'';
  return t==='master_table'?'MST':t==='fact_table'?'FACT':'OTHER';
}

/* 타입 → 시각 설정 */
var TV={
  master_table:{s:'diamond',c:'#7C3AED',z:52},
  fact_table:  {s:'ellipse', c:'#2563EB',z:46},
  csv_table:   {s:'dot',    c:'#0D9488',z:36},
  file:        {s:'box',    c:'#5C6BC0',z:28},
  'class':     {s:'ellipse',c:'#7B1FA2',z:24},
  'function':  {s:'dot',    c:'#0288D1',z:18},
  method:      {s:'dot',    c:'#0097A7',z:14},
  module:      {s:'triangle',c:'#558B2F',z:16},
};
function gv(type){return TV[type]||{s:'dot',c:'#6B7280',z:20};}
function fnt(sz,col){
  return {size:sz||14,strokeWidth:3,strokeColor:'#06060e',color:col||'#ffffff'};
}

/* ════ 줌 ════ */
var ZL=[.7,.8,.9,1.0],ZI=3;
function kgZ(d){
  ZI=Math.max(0,Math.min(ZL.length-1,ZI+d));
  var s=ZL[ZI];
  if(typeof network!=='undefined')
    network.moveTo({scale:s,animation:{duration:200,easingFunction:'easeInOutQuad'}});
  document.getElementById('kzl').textContent=Math.round(s*100)+'%';
  document.getElementById('kzi').disabled=(ZI>=ZL.length-1);
  document.getElementById('kzo').disabled=(ZI<=0);
}

/* ════ 드릴다운 초기화 ════ */
function initDD(){
  /* 그룹별 노드 분류 */
  var gs={MST:[],FACT:[],OTHER:[]};
  Object.keys(NM).forEach(function(id){
    var g=grp(id);
    if(!gs[g])gs[g]=[];
    gs[g].push(id);
  });
  /* 에지 수집 (중복 제거) */
  var eseen={},ae=[];
  Object.keys(NM).forEach(function(id){
    (NM[id].out_edges||[]).forEach(function(e){
      var k=id+'>>'+e.to;
      if(!eseen[k]){eseen[k]=1;ae.push({from:id,to:e.to,rel:e.rel||''});}
    });
  });
  DD={gs:gs,ae:ae};
  setV(1,null);
}

/* ════ 데이터셋 교체 ════ */
function setND(nds,eds){
  var nd=network.body.data.nodes;
  var ed=network.body.data.edges;
  nd.clear();ed.clear();
  nd.add(nds);ed.add(eds);
  network.stabilize(120);
}

/* ════ 뷰 전환 ════ */
var GN={MST:'마스터 테이블',FACT:'팩트 테이블',OTHER:'기타'};
var GC={MST:'#7C3AED',FACT:'#2563EB',OTHER:'#6B7280'};
var GX={MST:'📦',FACT:'📊',OTHER:'⚙️'};

function setV(lv,g){
  LV=lv; FG=g;
  document.getElementById('np').style.display='none';
  var nds=[],eds=[];

  if(lv===1){
    /* Level 1: 그룹 수퍼노드 */
    Object.keys(DD.gs).forEach(function(k){
      var cnt=(DD.gs[k]||[]).length;
      if(!cnt)return;
      nds.push({
        id:'_G_'+k,
        label:(GX[k]||'')+'  '+(GN[k]||k)+'
('+cnt+'개 테이블)',
        color:{background:GC[k]||'#6B7280',border:'#ffffff33',
               highlight:{background:GC[k]||'#6B7280',border:'#fff'}},
        size:Math.max(62,46+cnt*5),
        shape:'ellipse',
        borderWidth:3,
        font:{size:15,strokeWidth:4,strokeColor:'#06060e',bold:true,multi:true,color:'#ffffff'},
        shadow:{enabled:true,size:12,color:(GC[k]||'#555')+'66'},
        title:(DD.gs[k]||[]).join('
'),
        _grp:k, _isG:true,
      });
    });
    /* 그룹 간 집계 에지 */
    var ge={};
    DD.ae.forEach(function(e){
      var gf=grp(e.from),gt=grp(e.to);
      if(gf!==gt){
        var k='_G_'+gf+'>>_G_'+gt;
        if(!ge[k])ge[k]={from:'_G_'+gf,to:'_G_'+gt,n:0};
        ge[k].n++;
      }
    });
    Object.keys(ge).forEach(function(k){
      var e=ge[k];
      eds.push({from:e.from,to:e.to,label:'',title:e.n+'개 연결',
        width:Math.min(2+Math.floor(e.n/2),10),
        color:{color:'#475569'},arrows:'to',smooth:{type:'curvedCW',roundness:.2}});
    });
    setBr('전체 조감도',1,false);
    hint('그룹을 클릭하면 테이블 목록이 펼쳐집니다',3000);

  } else {
    /* Level 2: 그룹 내 테이블 + ghost 이웃 */
    var mem=DD.gs[g]||[],ms={};
    mem.forEach(function(id){ms[id]=true;});
    /* 다른 그룹 이웃 찾기 */
    var gh={};
    DD.ae.forEach(function(e){
      if(ms[e.from]&&!ms[e.to])gh[e.to]=true;
      if(ms[e.to]&&!ms[e.from])gh[e.from]=true;
    });
    /* 그룹 멤버 노드 (선명) */
    mem.forEach(function(id){
      var m=NM[id]||{},v=gv(m.type);
      nds.push({id:id,label:id,
        color:{background:v.c,border:v.c+'cc',highlight:{background:v.c,border:'#fff'}},
        size:v.z,shape:v.s,borderWidth:2,
        font:fnt(13),title:'컬럼 수: '+(m.columns||[]).length+'개'});
    });
    /* Ghost 이웃 노드 (흐림) */
    Object.keys(gh).forEach(function(id){
      var m=NM[id]||{},v=gv(m.type);
      nds.push({id:id,label:id,
        color:{background:v.c+'44',border:v.c+'33'},
        size:v.z*.6,shape:v.s,borderWidth:1,opacity:.38,
        font:fnt(10,'#475569'),title:'외부 연결 테이블'});
    });
    /* 에지 (가시 노드 간만) */
    var vs={};nds.forEach(function(n){vs[n.id]=true;});
    eds=DD.ae.filter(function(e){return vs[e.from]&&vs[e.to];})
      .map(function(e){
        return{from:e.from,to:e.to,label:'',title:e.rel||'',
          arrows:'to',color:{color:'#64748b'},
          smooth:{type:'curvedCW',roundness:.1}};
      });
    setBr((GN[g]||g),2,true);
    hint('테이블을 클릭하면 상세 정보를 볼 수 있습니다',2800);
  }

  setND(nds,eds);
}

/* ════ 브레드크럼 ════ */
function setBr(lbl,lv,back){
  var crumb=document.getElementById('kbc');
  crumb.innerHTML=lv===1?'<b>전체 조감도</b>':'전체 조감도 &rsaquo; <b>'+lbl+'</b>';
  document.getElementById('klv').textContent='Lv.'+lv+(lv===2?' · '+lbl:'');
  var b=document.getElementById('kbk');
  b.style.display=back?'flex':'none';
}

function hint(txt,ms){
  var h=document.getElementById('kht');
  h.textContent=txt;h.style.opacity='1';
  setTimeout(function(){h.style.opacity='0';},ms||2500);
}

function goBack(){if(LV===2)setV(1,null);}

/* ════ 상세 패널 (Level 3) ════ */
var TC={master_table:'#7C3AED',fact_table:'#2563EB',csv_table:'#0D9488'};
var TL={master_table:'MASTER TABLE',fact_table:'FACT TABLE',csv_table:'CSV TABLE'};
var TABLE_TYPES=['master_table','fact_table','csv_table'];

function showD(id){
  var m=NM[id]||{};
  document.getElementById('npn').textContent=id;
  var tg=document.getElementById('nptg');
  tg.style.background=TC[m.type]||'#6B7280';
  tg.textContent=TL[m.type]||m.type||'NODE';

  /* 컬럼 */
  var cols=m.columns||[],fks=m.fk_cols||[],ct=m.col_types||{};
  var ch='';
  if(!cols.length){
    ch='<div class="nn">정보 없음</div>';
  } else {
    cols.slice(0,25).forEach(function(c){
      var f=fks.indexOf(c)>=0;
      var t=ct[c]?'<span class="nr"> ('+ct[c]+')</span>':'';
      ch+='<div class="ncol'+(f?' fk':'')+'">'+c+t+(f?' ??':'')+'</div>';
    });
    if(cols.length>25)
      ch+='<div class="nn">… 외 '+(cols.length-25)+'개</div>';
  }
  document.getElementById('npc').innerHTML=ch;

  /* 연결 테이블 */
  var oe=m.out_edges||[],ie=m.in_edges||[],eh='';
  oe.forEach(function(e){
    eh+='<div class="nedg no">→ '+e.to
      +(e.rel?'<span class="nr"> ('+e.rel+')</span>':'')+'</div>';
  });
  ie.forEach(function(e){
    eh+='<div class="nedg ni">← '+e.from
      +(e.rel?'<span class="nr"> ('+e.rel+')</span>':'')+'</div>';
  });
  if(!eh)eh='<div class="nn">없음</div>';
  document.getElementById('npe').innerHTML=eh;

  /* 관련 문서 */
  var dh=TABLE_TYPES.indexOf(m.type)>=0
    ?'<div class="ndoc">?? '+id+'.csv</div>'
    :'<div class="nn">문서에서 추출된 엔티티</div>';
  document.getElementById('npd').innerHTML=dh;

  document.getElementById('np').style.display='block';
}

/* ════ 이벤트 바인딩 ════ */
(function poll(){
  if(typeof network!=='undefined'){
    /* 줌 라벨 동기화 */
    network.on('zoom',function(e){
      document.getElementById('kzl').textContent=Math.round(e.scale*100)+'%';
    });
    /* 클릭 핸들러 */
    network.on('click',function(p){
      if(!p.nodes.length)return;
      var id=p.nodes[0];
      if(LV===1){
        /* Level1 → Level2: 그룹 클릭 */
        var nd=network.body.data.nodes.get(id);
        if(nd&&nd._isG){setV(2,nd._grp);return;}
      }
      if(LV===2){
        /* Level2 → Level3: 테이블 클릭 → 상세 패널 */
        showD(id);
      }
    });
    /* 초기화 후 Level1 렌더 */
    initDD();
  } else {
    setTimeout(poll,150);
  }
})();
</script>
